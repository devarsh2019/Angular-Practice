<div class="flight-container">
  <h2>Flight Booker</h2>

  <div class="form-group">
    <label>Flight Type</label>
    <select [(ngModel)]="flightType">
      <option value="oneway">One-way flight</option>
      <option value="return">Return flight</option>
    </select>
  </div>

  <div class="form-group">
    <label>Departure Date</label>
    <input type="date" [(ngModel)]="departureDate" />
  </div>

  <div class="form-group" *ngIf="flightType === 'return'">
    <label>Return Date</label>
    <input type="date" [(ngModel)]="returnDate" />
  </div>

  <button class="book-btn" (click)="onSubmit()">Book</button>
</div>

<div class="success-overlay" *ngIf="showSuccess">
  <div class="success-card">

    <p *ngIf="flightType === 'oneway'">
      You have booked a one-way flight departing on {{departureDate}}
    </p>

    <p *ngIf="flightType === 'return'">
      You have booked a return flight, departing on {{departureDate}}
      and returning on {{returnDate}}
    </p>

    <button (click)="closeCard()">Close</button>

  </div>
</div>
