<h1>Welcome {{username.value}}</h1>
<label>UserName : </label>
<input [formControl]= "username" /> <br>
<label>Email : </label>
<input [formControl]= "email"/> <br>
<label>Date of Birth : </label>
<input [formControl] = "dob"/> <br>

<button (click)="onSave()" [disabled]="!username.value && !email.value && !dob.value">Save</button>
<button (click)="onReset()" [disabled]="!username.value && !email.value && !dob.value">Reset</button>

<h3> Number of Times Save button Clicked is {{count}}</h3>
